<rect x="6" y="14" width="4" height="4" fill="#f97316" opacity="0.95"/>
<rect x="10" y="14" width="4" height="4" fill="#1a1a1a"/>
<rect x="14" y="14" width="4" height="4" fill="#f97316" opacity="0.95"/>
<rect x="18" y="14" width="4" height="4" fill="#1a1a1a"/>
<!-- Orange accent bar at bottom -->
<rect x="0" y="26" width="32" height="3" fill="url(#flame)" rx="0"/>
