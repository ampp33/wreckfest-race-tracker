<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#1a1a1a"/>
<stop offset="100%" stop-color="#0d0d0d"/>
</linearGradient>
<linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
<stop offset="0%" stop-color="#ea580c"/>
<stop offset="60%" stop-color="#f97316"/>
<stop offset="100%" stop-color="#fbbf24"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="0.8" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>
<!-- Dark background with slightly rounded corners -->
<rect width="32" height="32" rx="5" fill="url(#bg)"/>
<!-- Subtle diagonal speed lines -->
<line x1="0" y1="8" x2="8" y2="0" stroke="#2a2a2a" stroke-width="1"/>
<line x1="0" y1="16" x2="16" y2="0" stroke="#2a2a2a" stroke-width="1"/>
<line x1="0" y1="24" x2="24" y2="0" stroke="#2a2a2a" stroke-width="1"/>
